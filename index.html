async function dbLoad(type){
  if(!st.teamId)return[];
  const{data,error}=await sb.from("bpn").select("*").eq("team_id",st.teamId).eq("type",type).order("ts",{ascending:false});

  return data.map(r=>({...JSON.parse(r.payload),_dbid:r.id}));
}
async function dbInsert(type,item){
  if(!st.teamId)return;
  await sb.from("bpn").insert({team_id:st.teamId,type,item_id:item.id,payload:JSON.stringify(item),ts:item.ts||Date.now()});

async function dbUpdate(type,item){

async function loadAll(){
  const[signals,drops,posts,promos,autoFromDB]=await Promise.all([
    dbLoad("signal"),dbLoad("drop"),dbLoad("post"),dbLoad("promo"),dbLoad("auto_signal")
  ]);
  // Merge server-side auto_signals over the localStorage cache
  let autoSignals=st.autoSignals;
  if(autoFromDB&&autoFromDB.length>0){
    autoSignals=autoFromDB.map(r=>r.payload);
    localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));

    st.lastScan=maxTs||st.lastScan;
  }

}

function getLLMKey(){return localStorage.getItem("bpn-llm-key")||""}

const LLM_PROMPT = `You are a TikTok Shop affiliate product strategist for a football-focused creator account. Given a football news headline, suggest 3-5 REAL EXISTING product categories that you can find on TikTok Shop or Amazon UK to tag in a TikTok video capitalising on this moment.

CRITICAL RULES:
- Suggest REAL PRODUCT TYPES THAT ALREADY EXIST on TikTok Shop / Amazon (e.g. "LED football-shaped night light", "Liverpool FC scarf", "Football Manager 2026 game", "Panini Premier League stickers 2026")
- NOT custom designs, NOT print-on-demand, NOT things you'd make yourself
- Mix of football-specific (fan merch, books, games) AND loosely-related products that fit the moment (e.g. "kitchen gadget" for a cooking-related player meme, "mens grooming kit" for a footballer known for style)
- Products must be broadly available: jerseys, scarves, books, video games, collectibles, posters, drinkware, electronics, home goods, fitness gear, snacks
- Use SEARCH-FRIENDLY keywords — plain nouns, no quotes or apostrophes, no punctuation
- Price range £5-£60 (TikTok Shop sweet spot)

Return ONLY valid JSON in this exact format, no markdown, no commentary:
{"products":[{"name":"short product name","search":"2-4 plain keywords for search","category":"Apparel|Accessories|Collectibles|Books|Games|Home|Tech|Food|Fitness|Other","desc":"1-sentence angle for the TikTok video hook","price":25}]}`;

async function suggestProducts(headline){
  // Path 1 (preferred): team-shared key, called via Edge Function
  if(st.teamLLM&&st.teamLLM.hasKey){
    try{
      const token=await getAuthToken();
      if(!token){st.lastLLMError="No session";return null}
      const r=await fetch(`${SUPABASE_URL}/functions/v1/llm-suggest`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
        body:JSON.stringify({headline,team_id:st.teamId})
      });
      const data=await r.json().catch(()=>null);
      if(!r.ok){st.lastLLMError="server "+r.status+": "+((data&&data.error)||"unknown");return null}
      st.lastLLMError="";
      return (data&&data.products)||null;
    }catch(e){
      st.lastLLMError="server fail: "+e.message;
      return null;
    }
  }
  // Path 2 (legacy fallback): per-user localStorage key, direct provider call
  const key=getLLMKey();
  const provider=getLLMProvider();
  if(!key){st.lastLLMError="No API key set";return null}
  try{
    let url, body, headers;
    if(provider==="groq"){
      url="https://api.groq.com/openai/v1/chat/completions";
      headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
      body=JSON.stringify({model:"llama-3.1-8b-instant",messages:[{role:"system",content:LLM_PROMPT},{role:"user",content:headline}],temperature:0.7,max_tokens:600,response_format:{type:"json_object"}});
    } else if(provider==="openai"){
      url="https://api.openai.com/v1/chat/completions";
      headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
      body=JSON.stringify({model:"gpt-4o-mini",messages:[{role:"system",content:LLM_PROMPT},{role:"user",content:headline}],temperature:0.7,max_tokens:600,response_format:{type:"json_object"}});
    } else if(provider==="anthropic"){
      url="https://api.anthropic.com/v1/messages";
      headers={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
      body=JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,system:LLM_PROMPT,messages:[{role:"user",content:headline}]});
    } else {
      st.lastLLMError="Unknown provider: "+provider;
      return null;
    }
    const r=await fetch(url,{method:"POST",headers,body});
    if(!r.ok){
      const errText=await r.text();
      st.lastLLMError=provider+" "+r.status+": "+errText.slice(0,200);
      console.error("LLM error",r.status,errText);
      return null;
    }
    const data=await r.json();
    const txt=provider==="anthropic"?data.content[0].text:data.choices[0].message.content;
    const cleaned=txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
    const parsed=JSON.parse(cleaned);
    st.lastLLMError="";
    return parsed.products||null;
  }catch(e){
    st.lastLLMError=provider+" fail: "+e.message;
    console.error("Suggest error:",e);
    return null;
  }
}

async function fetchReddit(sub,limit=15){
  try{const r=await fetch("https://www.reddit.com/r/"+sub+"/hot.json?limit="+limit+"&raw_json=1");if(!r.ok)return[];const d=await r.json();return(d.data.children||[]).filter(c=>!c.data.stickied).map(c=>{const p=c.data;const ageH=Math.max(1,(Date.now()/1000-p.created_utc)/3600);const v=Math.min(10,Math.round(Math.log2(1+(p.ups+p.num_comments*3)/ageH)));return{id:"a-"+p.id,keyword:p.title.length>80?p.title.slice(0,77)+"...":p.title,fullTitle:p.title,source:"Reddit r/"+sub,velocity:v,notes:p.num_comments+" comments - "+p.ups+" upvotes - "+Math.round(ageH)+"h ago",url:"https://reddit.com"+p.permalink,category:guessCat(p.title),ts:p.created_utc*1000,auto:true,products:null}})}catch{return[]}}
function guessCat(t){t=t.toLowerCase();if(/kit|jersey|shirt|wear/.test(t))return"Apparel";if(/poster|art|print|photo/.test(t))return"Art/Prints";if(/scarf|hat|flag|badge/.test(t))return"Accessories";return""}

async function triggerServerScan(){
  // Calls scan-signals Edge Function. Returns true if it ran and wrote rows.
  if(!st.teamLLM||!st.teamLLM.hasKey)return false;
  const token=await getAuthToken();
  if(!token)return false;
  try{
    const r=await fetch(`${SUPABASE_URL}/functions/v1/scan-signals`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:"{}"
    });
    if(!r.ok)return false;
    const data=await r.json().catch(()=>null);
    return !!(data&&data.ok&&data.signals_written>0);
  }catch{return false}
}

async function scanNow(){
  S({scanning:true,scanProgress:"Scanning..."});
  // Path 1 (preferred): server-side scan + LLM enrichment in one shot.
  if(st.teamLLM&&st.teamLLM.hasKey){
    S({scanProgress:"Server scan..."});
    const ok=await triggerServerScan();
    if(ok){
      const autoFromDB=await dbLoad("auto_signal");
      const autoSignals=autoFromDB.map(r=>r.payload);
      const lastScan=autoSignals.reduce((m,s)=>Math.max(m,s.ts||0),Date.now());
      localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));
      localStorage.setItem("bpn-ls",String(lastScan));
      S({autoSignals,lastScan,scanning:false,scanProgress:""});
      return;
    }
    // If server scan failed, fall through to legacy direct path.
  }
  // Path 2 (legacy fallback): direct Reddit fetch in browser.
  try{
    // Step 1: Fetch Reddit (parallel, 3 subs)
    S({scanProgress:"Fetching Reddit..."});
    const[a,b,c]=await Promise.all([fetchReddit("soccer",15),fetchReddit("PremierLeague",10),fetchReddit("EFL",8)]);
    const all=[...a,...b,...c];
    const seen=new Set();
    const dd=all.filter(s=>{const k=s.keyword.toLowerCase().slice(0,30);if(seen.has(k))return false;seen.add(k);return true});
    dd.sort((a,b)=>b.velocity-a.velocity);
    let autoSignals=dd.slice(0,20);
    // Show signals immediately - users see trending topics right away
    const lastScan=Date.now();
    localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));
    localStorage.setItem("bpn-ls",String(lastScan));
    S({autoSignals,lastScan,scanProgress:"Generating product ideas..."});

    // Step 2: LLM enrichment in PARALLEL (not sequential)
    if(hasLLMConfigured()){
      const topSignals=autoSignals.filter(s=>s.velocity>=6).slice(0,5);
      if(topSignals.length>0){
        S({scanProgress:"Ideas 0/"+topSignals.length+"..."});
        let done=0;
        // Fire all LLM calls in parallel
        const promises=topSignals.map(async sig=>{
          const products=await suggestProducts(sig.fullTitle||sig.keyword);
          done++;
          S({scanProgress:"Ideas "+done+"/"+topSignals.length+"..."});
          return{sigId:sig.id,products};
        });
        const results=await Promise.all(promises);
        // Apply all results at once
        results.forEach(({sigId,products})=>{
          if(products){
            const idx=autoSignals.findIndex(s=>s.id===sigId);
            if(idx>=0)autoSignals[idx].products=products;
          }
        });
        localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));
      }
    }
    S({autoSignals,scanning:false,scanProgress:""});
  }catch(e){console.error(e);S({scanning:false,scanProgress:""})}
}

async function createShopifyDraft(drop){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){alert("Please sign in again");return}
    const r=await fetch(`${SUPABASE_URL}/functions/v1/shopify-create-draft`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},
      body:JSON.stringify({team_id:st.teamId,product:{title:drop.name,body_html:drop.moment||"",vendor:st.teamName,product_type:drop.category,tags:"bpn,moment-drop,"+drop.category.toLowerCase(),variants:[{price:drop.price,cost:drop.cost}]}})
    });
    const result=await r.json();
    if(result.error){alert("Shopify error: "+result.error);return}
    alert(`Draft created! Opening in Shopify...`);
    if(result.admin_url)window.open(result.admin_url,"_blank");
  }catch(e){alert("Error: "+e.message)}

async function syncShopifyOrders(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return;
    S({syncingShopify:true});
    const r=await fetch(`${SUPABASE_URL}/functions/v1/shopify-sync-orders`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},
      body:JSON.stringify({team_id:st.teamId})
    });
    const result=await r.json();
    if(result.orders){
      // Match orders to active drops by product name
      const drops=[...st.drops];
      result.orders.forEach(o=>{
        const drop=drops.find(d=>d.status==="active"&&o.line_items.some(li=>li.title.toLowerCase().includes(d.name.toLowerCase().slice(0,20))));
        if(drop){
          drop.revenue=(drop.revenue||0)+Number(o.total_price);
          drop.orders=(drop.orders||0)+1;
        }
      });
      // Persist updated drops
      for(const d of drops.filter(x=>x.status==="active")){await dbUpdate("drop",d)}
      S({drops,syncingShopify:false,lastShopifySync:Date.now()});
      localStorage.setItem("bpn-shopify-sync",String(Date.now()));
      alert(`Synced ${result.orders.length} orders. Drops updated.`);
    }else{S({syncingShopify:false})}
  }catch(e){S({syncingShopify:false});alert("Sync error: "+e.message)}
}

function productToScore(product,sourceSignal){
  st.df.name=product.name;
  st.df.moment=sourceSignal.fullTitle||sourceSignal.keyword;
  st.df.category=product.category||CATS[0];
  st.df.price=product.price||25;
  st.df.cost=product.cost||8;
  // Auto-estimate scores: signal strength from velocity, margin from price/cost, halflife based on source freshness
  const marginPct=product.price>0?(product.price-product.cost)/product.price:0;
  st.df.scores={
    signal: sourceSignal.velocity>=8?2:sourceSignal.velocity>=6?1:0,
    audience: 1, // default middle, user adjusts
    speed: 2, // POD is always fast
    margin: marginPct>=0.35?2:marginPct>=0.2?1:0,
    halflife: 1, // default middle
  };
  S({tab:"score"});
}

function buildProductSearches(product){
  // Prefer LLM-provided clean search query, fallback to cleaned name
  const raw=(product.search||product.name||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").trim();
  const q=encodeURIComponent(raw);
  // Amazon Associates UK affiliate tag from config (e.g. "bpnetwork-21")
  const amznTag=st.cfg.amazonTag||"";
  const amznSuffix=amznTag?`&tag=${encodeURIComponent(amznTag)}`:"";
  // TikTok Shop deep link — opens in TikTok app on mobile
  // Web: https://www.tiktok.com/shop/search?q=X
  // Some devices open app directly with this URL scheme
  return [
    {label:"TikTok Shop",icon:"TT",url:`https://www.tiktok.com/shop/s/${q}`,desc:"Search TikTok Shop (opens in app on mobile)",primary:true},
    {label:"TikTok Affiliate Center",icon:"TA",url:`https://affiliate.tiktok.com/connection/product?shop_region=GB`,desc:"Browse all affiliate products"},
    {label:"Amazon UK",icon:"AZ",url:`https://www.amazon.co.uk/s?k=${q}${amznSuffix}`,desc:amznTag?"Search Amazon with your affiliate tag":"Add tag in Settings to earn commission",primary:true},
    {label:"Awin Sports",icon:"AW",url:`https://ui.awin.com/merchant-profile/search?search=${q}`,desc:"Browse UK sports merchants (requires Awin account)"},
    {label:"eBay UK",icon:"EB",url:`https://www.ebay.co.uk/sch/i.html?_nkw=${q}&_sop=12`,desc:"Live listings, best match"},
    {label:"Google Shopping",icon:"GS",url:`https://www.google.com/search?tbm=shop&q=${q}`,desc:"Price compare across retailers"},
  ];
}

// One-tap full pipeline: from a hot signal + LLM product suggestion,
// create drop + promo + content card + UTM link + (optional) Shopify draft.
async function oneTapPromote(product,signal){
  if(!product||!signal)return null;
  const moment=signal.fullTitle||signal.keyword||"";
  const price=Number(product.price)||25;
  const cost=Number(product.cost)||Math.round(price*0.4);
  const marginPct=price>0?(price-cost)/price:0;
  const dropItem={
    id:uid(),
    name:product.name,
    moment,
    category:product.category||CATS[0],
    scores:{
      signal: signal.velocity>=8?2:signal.velocity>=6?1:0,
      audience: 1,
      speed: 2,
      margin: marginPct>=0.35?2:marginPct>=0.2?1:0,
      halflife: 1,
    },
    price, cost,
    status:"active",
    revenue:0, orders:0, adSpend:0, returns:0,
    sourceSignalId:signal.id,
    productSearch:product.search||product.name,
    ts:Date.now(),
  };
  const promoItem={
    id:uid(),
    productName:product.name,
    searchQuery:product.search||product.name,
    category:product.category||"Other",
    platform:"tiktok-shop",
    moment,
    momentSource:signal.source||"",
    velocity:signal.velocity||0,
    status:"posted",
    clicks:0, sales:0, commission:0, adSpend:0,
    videoUrl:"", notes:"",
    dropId:dropItem.id,
    ts:Date.now(),
  };
  let utmLink="";
  if(st.cfg.storeUrl){
    const camp=(product.name+"-"+Date.now()).toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,40);
    const sep=st.cfg.storeUrl.includes("?")?"&":"?";
    utmLink=`${st.cfg.storeUrl}${sep}utm_source=tiktok&utm_medium=video&utm_campaign=${camp}`;
  }
  const captionMoment=moment.length>70?moment.slice(0,70)+"...":moment;
  const postItem={
    id:uid(),
    platform:"tiktok",
    caption:`POV: ${captionMoment} - grab this ${product.name.toLowerCase()} before it sells out${utmLink?" "+utmLink:""}`,
    dropId:dropItem.id,
    posted:false,
    ts:Date.now(),
  };
  // Persist all three in parallel
  await Promise.all([
    dbInsert("drop",dropItem),
    dbInsert("promo",promoItem),
    dbInsert("post",postItem),
  ]);
  // Optionally fire Shopify draft creation in the background
  if(st.cfg.shopifyEdgeConfigured){
    createShopifyDraft(dropItem).catch(e=>console.warn("Shopify draft failed",e));
  }
  S({
    drops:[dropItem,...st.drops],
    promos:[promoItem,...st.promos],
    posts:[postItem,...st.posts],
    promoteResult:{drop:dropItem,product,signal,utmLink,ts:Date.now()},
  });
  return {drop:dropItem,promo:promoItem,post:postItem,utmLink};
}

// ─── TikTok Affiliate CSV Import ───
// TikTok Affiliate Center > Reports > Performance lets creators export CSV.
// Common columns: "Product Name", "Clicks", "Orders", "Estimated Commission", "Video URL" / "Video ID"
// Column names vary by TikTok region/dashboard — we match flexibly.
function parseCSV(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  if(lines.length<2)return{headers:[],rows:[]};
  // Naive but tolerant CSV parser - handles quoted fields with commas
  const parseLine=(line)=>{
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
      else if(ch===','&&!inQ){out.push(cur);cur=""}
      else cur+=ch;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const headers=parseLine(lines[0]).map(h=>h.toLowerCase());
  const rows=lines.slice(1).map(l=>{
    const fields=parseLine(l);
    const row={};
    headers.forEach((h,i)=>{row[h]=fields[i]||""});
    return row;
  });
  return{headers,rows};
}

// Find first matching column from a list of candidates
function findCol(row,candidates){
  for(const c of candidates){
    for(const k of Object.keys(row)){
      if(k.includes(c))return row[k];
    }
  }
  return"";
}

function parseNum(v){
  if(v==null)return 0;
  const s=String(v).replace(/[£$€,]/g,"").trim();
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

async function importTikTokCSV(file){
  try{
    const text=await file.text();
    return await importTikTokCSVText(text);
  }catch(e){alert("CSV import error: "+e.message);console.error(e)}
}

async function importTikTokCSVText(text){
  try{
    const{rows}=parseCSV(text);
    if(rows.length===0){alert("CSV looks empty");return}
    let matched=0,created=0,skipped=0;
    const promos=[...st.promos];

    for(const row of rows){
      const productName=findCol(row,["product name","product","item name","item"]).trim();
      if(!productName)continue;
      const clicks=parseNum(findCol(row,["clicks","click"]));
      const orders=parseNum(findCol(row,["orders","sold","sales count","sale count"]));
      const commission=parseNum(findCol(row,["estimated commission","commission","payout","earnings","earned"]));
      const sales=parseNum(findCol(row,["sales","revenue","gmv","sales amount"]));
      const videoUrl=findCol(row,["video url","video link","tiktok url","content url"]).trim();
      const videoId=findCol(row,["video id","content id"]).trim();

      // Try fuzzy match against existing promos by product name (first 25 chars, case-insensitive)
      const key=productName.toLowerCase().slice(0,25);
      const existing=promos.find(p=>{
        const pName=(p.productName||"").toLowerCase();
        return pName.slice(0,25)===key||pName.includes(key)||key.includes(pName.slice(0,15));
      });

      if(existing){
        // Update existing — take max of CSV vs existing (CSV is usually more recent and accurate)
        existing.clicks=Math.max(Number(existing.clicks)||0,clicks);
        existing.sales=Math.max(Number(existing.sales)||0,orders||sales);
        existing.commission=Math.max(Number(existing.commission)||0,commission);
        if(videoUrl&&!existing.videoUrl)existing.videoUrl=videoUrl;
        if(videoId&&!existing.videoUrl)existing.videoUrl="https://www.tiktok.com/video/"+videoId;
        // Auto-update status based on data
        if(orders>0||sales>0||commission>0)existing.status="earned";
        else if(clicks>20)existing.status="pending-sale";
        existing.lastSync=Date.now();
        await dbUpdate("promo",existing);
        matched++;
      }else if(productName&&(clicks>0||orders>0||commission>0)){
        // Create new entry from CSV row
        const newPromo={
          id:uid(),
          productName,
          searchQuery:productName,
          category:"Other",
          platform:"tiktok-shop",
          moment:"Imported from TikTok CSV",
          momentSource:"TikTok Affiliate (CSV)",
          velocity:0,
          status:(orders>0||commission>0)?"earned":(clicks>20?"pending-sale":"posted"),
          clicks,sales:orders||sales,commission,adSpend:0,
          videoUrl:videoUrl||(videoId?"https://www.tiktok.com/video/"+videoId:""),
          notes:"Auto-imported "+new Date().toLocaleDateString(),
          ts:Date.now(),
          lastSync:Date.now(),
        };
        promos.unshift(newPromo);
        await dbInsert("promo",newPromo);
        created++;
      }else{
        skipped++;
      }
    }

    localStorage.setItem("bpn-tt-sync",String(Date.now()));
    S({promos,lastTikTokSync:Date.now()});
    alert(`TikTok import complete:\n${matched} updated, ${created} new, ${skipped} skipped (no activity)`);
  }catch(e){alert("CSV import error: "+e.message);console.error(e)}
}
