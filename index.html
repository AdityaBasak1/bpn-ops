// ─── Auto-scan + LLM Product Suggestions ───
function getLLMKey(){return localStorage.getItem("bpn-llm-key")||""}
function setLLMKey(k){localStorage.setItem("bpn-llm-key",k)}
function getLLMProvider(){return localStorage.getItem("bpn-llm-provider")||"groq"}
function setLLMProvider(p){localStorage.setItem("bpn-llm-provider",p)}

const LLM_PROMPT = `You are a TikTok Shop affiliate product strategist for a football-focused creator account. Given a football news headline, suggest 3-5 REAL EXISTING product categories that you can find on TikTok Shop or Amazon UK to tag in a TikTok video capitalising on this moment.

CRITICAL RULES:
- Suggest REAL PRODUCT TYPES THAT ALREADY EXIST on TikTok Shop / Amazon (e.g. "LED football-shaped night light", "Liverpool FC scarf", "Football Manager 2026 game", "Panini Premier League stickers 2026")
- NOT custom designs, NOT print-on-demand, NOT things you'd make yourself
- Mix of football-specific (fan merch, books, games) AND loosely-related products that fit the moment (e.g. "kitchen gadget" for a cooking-related player meme, "mens grooming kit" for a footballer known for style)
- Products must be broadly available: jerseys, scarves, books, video games, collectibles, posters, drinkware, electronics, home goods, fitness gear, snacks
- Use SEARCH-FRIENDLY keywords — plain nouns, no quotes or apostrophes, no punctuation
- Price range £5-£60 (TikTok Shop sweet spot)

Return ONLY valid JSON in this exact format, no markdown, no commentary:
{"products":[{"name":"short product name","search":"2-4 plain keywords for search","category":"Apparel|Accessories|Collectibles|Books|Games|Home|Tech|Food|Fitness|Other","desc":"1-sentence angle for the TikTok video hook","price":25}]}`;

async function suggestProducts(headline){
  const key=getLLMKey();
  const provider=getLLMProvider();
  if(!key){st.lastLLMError="No API key set";return null}
  try{
    let url, body, headers;
    if(provider==="groq"){
      url="https://api.groq.com/openai/v1/chat/completions";
      headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
      body=JSON.stringify({model:"llama-3.1-8b-instant",messages:[{role:"system",content:LLM_PROMPT},{role:"user",content:headline}],temperature:0.7,max_tokens:600,response_format:{type:"json_object"}});
    } else if(provider==="openai"){
      url="https://api.openai.com/v1/chat/completions";
      headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
      body=JSON.stringify({model:"gpt-4o-mini",messages:[{role:"system",content:LLM_PROMPT},{role:"user",content:headline}],temperature:0.7,max_tokens:600,response_format:{type:"json_object"}});
    } else if(provider==="anthropic"){
      url="https://api.anthropic.com/v1/messages";
      headers={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
      body=JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,system:LLM_PROMPT,messages:[{role:"user",content:headline}]});
    } else {
      st.lastLLMError="Unknown provider: "+provider;
      return null;
    }
    const r=await fetch(url,{method:"POST",headers,body});
    if(!r.ok){
      const errText=await r.text();
      st.lastLLMError=provider+" "+r.status+": "+errText.slice(0,200);
      console.error("LLM error",r.status,errText);
      return null;
    }
    const data=await r.json();
    const txt=provider==="anthropic"?data.content[0].text:data.choices[0].message.content;
    const cleaned=txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
    const parsed=JSON.parse(cleaned);
    st.lastLLMError="";
    return parsed.products||null;
  }catch(e){
    st.lastLLMError=provider+" fail: "+e.message;
    console.error("Suggest error:",e);
    return null;
  }
}

async function fetchReddit(sub,limit=15){
  try{const r=await fetch("https://www.reddit.com/r/"+sub+"/hot.json?limit="+limit+"&raw_json=1");if(!r.ok)return[];const d=await r.json();return(d.data.children||[]).filter(c=>!c.data.stickied).map(c=>{const p=c.data;const ageH=Math.max(1,(Date.now()/1000-p.created_utc)/3600);const v=Math.min(10,Math.round(Math.log2(1+(p.ups+p.num_comments*3)/ageH)));return{id:"a-"+p.id,keyword:p.title.length>80?p.title.slice(0,77)+"...":p.title,fullTitle:p.title,source:"Reddit r/"+sub,velocity:v,notes:p.num_comments+" comments - "+p.ups+" upvotes - "+Math.round(ageH)+"h ago",url:"https://reddit.com"+p.permalink,category:guessCat(p.title),ts:p.created_utc*1000,auto:true,products:null}})}catch{return[]}}
function guessCat(t){t=t.toLowerCase();if(/kit|jersey|shirt|wear/.test(t))return"Apparel";if(/poster|art|print|photo/.test(t))return"Art/Prints";if(/scarf|hat|flag|badge/.test(t))return"Accessories";return""}

async function scanNow(){
  S({scanning:true,scanProgress:"Fetching Reddit..."});
  try{
    // Step 1: Fetch Reddit (parallel, 3 subs)
    const[a,b,c]=await Promise.all([fetchReddit("soccer",15),fetchReddit("PremierLeague",10),fetchReddit("EFL",8)]);
    const all=[...a,...b,...c];
    const seen=new Set();
    const dd=all.filter(s=>{const k=s.keyword.toLowerCase().slice(0,30);if(seen.has(k))return false;seen.add(k);return true});
    dd.sort((a,b)=>b.velocity-a.velocity);
    let autoSignals=dd.slice(0,20);
    // Show signals immediately - users see trending topics right away
    const lastScan=Date.now();
    localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));
    localStorage.setItem("bpn-ls",String(lastScan));
    S({autoSignals,lastScan,scanProgress:"Generating product ideas..."});

    // Step 2: LLM enrichment in PARALLEL (not sequential)
    if(getLLMKey()){
      const topSignals=autoSignals.filter(s=>s.velocity>=6).slice(0,5);
      if(topSignals.length>0){
        S({scanProgress:"Ideas 0/"+topSignals.length+"..."});
        let done=0;
        // Fire all LLM calls in parallel
        const promises=topSignals.map(async sig=>{
          const products=await suggestProducts(sig.fullTitle||sig.keyword);
          done++;
          S({scanProgress:"Ideas "+done+"/"+topSignals.length+"..."});
          return{sigId:sig.id,products};
        });
        const results=await Promise.all(promises);
        // Apply all results at once
        results.forEach(({sigId,products})=>{
          if(products){
            const idx=autoSignals.findIndex(s=>s.id===sigId);
            if(idx>=0)autoSignals[idx].products=products;
          }
        });
        localStorage.setItem("bpn-auto",JSON.stringify(autoSignals));
      }
    }
    S({autoSignals,scanning:false,scanProgress:""});
  }catch(e){console.error(e);S({scanning:false,scanProgress:""})}
}

async function createShopifyDraft(drop){

    if(result.admin_url)window.open(result.admin_url,"_blank");

}

async function syncShopifyOrders(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return;
    S({syncingShopify:true});
    const r=await fetch(`${SUPABASE_URL}/functions/v1/shopify-sync-orders`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},
      body:JSON.stringify({team_id:st.teamId})
    });
    const result=await r.json();
    if(result.orders){
      // Match orders to active drops by product name
      const drops=[...st.drops];
      result.orders.forEach(o=>{
        const drop=drops.find(d=>d.status==="active"&&o.line_items.some(li=>li.title.toLowerCase().includes(d.name.toLowerCase().slice(0,20))));
        if(drop){
          drop.revenue=(drop.revenue||0)+Number(o.total_price);
          drop.orders=(drop.orders||0)+1;
        }
      });
      // Persist updated drops
      for(const d of drops.filter(x=>x.status==="active")){await dbUpdate("drop",d)}
      S({drops,syncingShopify:false,lastShopifySync:Date.now()});

function productToScore(product,sourceSignal){
  st.df.name=product.name;
  st.df.moment=sourceSignal.fullTitle||sourceSignal.keyword;
  st.df.category=product.category||CATS[0];
  st.df.price=product.price||25;
  st.df.cost=product.cost||8;
  // Auto-estimate scores: signal strength from velocity, margin from price/cost, halflife based on source freshness
  const marginPct=product.price>0?(product.price-product.cost)/product.price:0;
  st.df.scores={
    signal: sourceSignal.velocity>=8?2:sourceSignal.velocity>=6?1:0,
    audience: 1, // default middle, user adjusts
    speed: 2, // POD is always fast
    margin: marginPct>=0.35?2:marginPct>=0.2?1:0,
    halflife: 1, // default middle
  };
  S({tab:"score"});
}

// Maps each category to the most relevant search keywords/types
function buildProductSearches(product){
  // Prefer LLM-provided clean search query, fallback to cleaned name
  const raw=(product.search||product.name||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").trim();
  const q=encodeURIComponent(raw);
  // Amazon Associates UK affiliate tag from config (e.g. "bpnetwork-21")
  const amznTag=st.cfg.amazonTag||"";
  const amznSuffix=amznTag?`&tag=${encodeURIComponent(amznTag)}`:"";
  // TikTok Shop deep link — opens in TikTok app on mobile
  // Web: https://www.tiktok.com/shop/search?q=X
  // Some devices open app directly with this URL scheme
  return [
    {label:"TikTok Shop",icon:"TT",url:`https://www.tiktok.com/shop/s/${q}`,desc:"Search TikTok Shop (opens in app on mobile)",primary:true},
    {label:"TikTok Affiliate Center",icon:"TA",url:`https://affiliate.tiktok.com/connection/product?shop_region=GB`,desc:"Browse all affiliate products"},
    {label:"Amazon UK",icon:"AZ",url:`https://www.amazon.co.uk/s?k=${q}${amznSuffix}`,desc:amznTag?"Search Amazon with your affiliate tag":"Add tag in Settings to earn commission",primary:true},
    {label:"Awin Sports",icon:"AW",url:`https://ui.awin.com/merchant-profile/search?search=${q}`,desc:"Browse UK sports merchants (requires Awin account)"},
    {label:"eBay UK",icon:"EB",url:`https://www.ebay.co.uk/sch/i.html?_nkw=${q}&_sop=12`,desc:"Live listings, best match"},
    {label:"Google Shopping",icon:"GS",url:`https://www.google.com/search?tbm=shop&q=${q}`,desc:"Price compare across retailers"},
  ];
}
